[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Critical for clone chips (from your previous review)
board_build.flash_mode = dio

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1          # Use this since your doc says so -D ST7789_DRIVER   ILI9341_DRIVER
  -D TFT_WIDTH=240             # Width in portrait
  -D TFT_HEIGHT=320            # Height in portrait
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=27
  -D TFT_BACKLIGHT_ON=HIGH
  -D TOUCH_CS=33
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D SMOOTH_FONT=1
  -D SPI_FREQUENCY=40000000    # 80MHz is risky on N100/Cheap clones
  -D SPI_TOUCH_FREQUENCY=2500000
